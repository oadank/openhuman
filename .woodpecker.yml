when:
  - event: push
    branch: main
    paths:
      include:
        - Dockerfile
        - .dockerignore
        - Cargo.toml
        - Cargo.lock
        - rust-toolchain.toml
        - src/**
        - tests/**
  - event: manual

# Skip submodule init: tauri-cef/tauri-plugin-notification are desktop-only;
# the server (openhuman-core) binary only needs the Rust source in src/.
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: run-tests
    image: rust:1.93-bookworm
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends
          build-essential cmake pkg-config libssl-dev libasound2-dev
          libxdo-dev libxtst-dev libx11-dev libevdev-dev clang mold
          ca-certificates git >/dev/null
      - cargo test --test inference_provider_e2e --test json_rpc_e2e 2>&1
    when:
      - event: [push, manual]

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: repo.indexarr.net/indexarr/openhuman-core
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tags:
        - latest
        - ${CI_COMMIT_SHA}
      platforms: linux/amd64
    when:
      - event: [push, manual]

  - name: komodo-deploy
    image: alpine:3.23
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      KOMODO_API_KEY:
        from_secret: komodo_api_key
      KOMODO_API_SECRET:
        from_secret: komodo_api_secret
    commands:
      - apk add --no-cache bash git curl python3 >/dev/null
      - 'curl -sSf -H "Authorization: token $GIT_AUTH_TOKEN" -o /tmp/komodo-deploy.sh https://repo.indexarr.net/indexarr/ops/raw/branch/main/scripts/komodo-deploy.sh'
      - chmod +x /tmp/komodo-deploy.sh
      - STACK_NAME=prod-openhuman-core STACK_DIR=prod/openhuman-core IMAGE_NAME=repo.indexarr.net/indexarr/openhuman-core IMAGE_TAG=$CI_COMMIT_SHA bash /tmp/komodo-deploy.sh
    when:
      - event: [push, manual]

  - name: discord-success
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Successful\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 5025616,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Failed\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 15548997,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
