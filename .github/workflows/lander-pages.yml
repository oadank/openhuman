name: Deploy lander to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "lander/**"
      - ".github/workflows/lander-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: cd lander && npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '' || format('/{0}', github.event.repository.name) }}
        run: |
          cd lander
          npm run build

          # If Next doesn't emit `out/` automatically, fall back to `next export`.
          if [ ! -d out ]; then
            npx next export --out-dir out
          fi

          # GitHub Pages custom domain support: CNAME must be present at the site root.
          echo "tryopenhuman.com" > out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "lander/out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

